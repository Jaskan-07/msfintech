services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: economic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: economic_indicators
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - economic-network

  # Liquibase Migration
  liquibase:
    image: liquibase/liquibase:4.25-alpine
    container_name: economic-liquibase
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migration/changelog:/liquibase/changelog
    environment:
      - LIQUIBASE_DUPLICATE_FILE_MODE=WARN
      - LIQUIBASE_VALIDATE_XML_CHANGELOG_FILES=false
    command: >
      --url=jdbc:postgresql://db:5432/economic_indicators
      --username=postgres
      --password=postgres
      --changeLogFile=db.changelog-master.xml
      update
    networks:
      - economic-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: economic-api
    depends_on:
      liquibase:
        condition: service_completed_successfully
    environment:
      POSTGRES_SERVER: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: economic_indicators
    ports:
      - "8000:8000"
    networks:
      - economic-network

volumes:
  postgres_data:

networks:
  economic-network:
    driver: bridge
